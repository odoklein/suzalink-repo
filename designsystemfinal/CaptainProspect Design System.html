 stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span>Search<\u002Fspan><kbd class=\"kbd\">⌘K<\u002Fkbd><\u002Fdiv>\n        <div class=\"navdemo__group\">\n          <div class=\"navdemo__item navdemo__item--on\"><span class=\"navdemo__glyph\"><\u002Fspan>Overview<kbd class=\"kbd kbd--ghost\">1<\u002Fkbd><\u002Fdiv>\n          <div class=\"navdemo__item\"><span class=\"navdemo__glyph\"><\u002Fspan>Missions<span class=\"navdemo__count\">12<\u002Fspan><\u002Fdiv>\n          <div class=\"navdemo__item\"><span class=\"navdemo__glyph\"><\u002Fspan>Lists<span class=\"navdemo__count\">34<\u002Fspan><\u002Fdiv>\n          <div class=\"navdemo__item\"><span class=\"navdemo__glyph\"><\u002Fspan>Calls<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"navdemo__group\">\n          <div class=\"navdemo__section\">Follow-up<\u002Fdiv>\n          <div class=\"navdemo__item\"><span class=\"navdemo__glyph\"><\u002Fspan>Clients<\u002Fdiv>\n          <div class=\"navdemo__item\"><span class=\"navdemo__glyph\"><\u002Fspan>Meetings<span class=\"navdemo__count navdemo__count--warn\">3<\u002Fspan><\u002Fdiv>\n          <div class=\"navdemo__item\"><span class=\"navdemo__glyph\"><\u002Fspan>Stats<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"navdemo__foot\">\n          <div class=\"navdemo__profile\"><span class=\"avatar avatar--sm\" data-init=\"JF\">JF<\u002Fspan><div><div class=\"navdemo__who\">Jean-François<\u002Fdiv><div class=\"navdemo__role\">Manager<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================ -->\n<!-- 05 — SCREENS (external file for size) -->\n<!-- ============================================================ -->\n<section class=\"chapter\" id=\"screens\" data-screen-label=\"06 Screens\">\n  <div class=\"chapter__head\">\n    <div class=\"chapter__num\">05<\u002Fdiv>\n    <h2 class=\"chapter__title\">Applied Screen Redesigns<\u002Fh2>\n    <p class=\"chapter__dek\">Six surfaces rendered end-to-end in the new system, with a before/after read on each decision.<\u002Fp>\n  <\u002Fdiv>\n  <div id=\"screens-mount\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================ -->\n<!-- 06 — HANDOFF -->\n<!-- ============================================================ -->\n<section class=\"chapter chapter--tinted\" id=\"handoff\" data-screen-label=\"07 Handoff\">\n  <div class=\"chapter__head\">\n    <div class=\"chapter__num\">06<\u002Fdiv>\n    <h2 class=\"chapter__title\">Handoff &amp; Rollout<\u002Fh2>\n    <p class=\"chapter__dek\">Concrete guidance for the team. Tokens to ship, components to map, an order that minimizes user disruption.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"handoff\">\n    <div class=\"handoff__col\">\n      <h4>Tokens<\u002Fh4>\n      <p>Ship as a single <code>tokens.json<\u002Fcode> consumed by Tailwind config and a CSS custom-properties file. Dark mode is a sibling theme file — same role names, different values.<\u002Fp>\n      <pre class=\"code\">{\n  \"color\": {\n    \"surface\": { \"canvas\": \"#FAF9F6\", \"raised\": \"#FFFFFF\", \"sunken\": \"#F1EFE9\" },\n    \"text\":    { \"primary\": \"#0E0F0C\", \"secondary\": \"#4A4B46\", \"tertiary\": \"#8A8A83\" },\n    \"accent\":  { \"primary\": \"#2B5F3E\", \"primary-soft\": \"#E7EFE9\" },\n    \"signal\":  { \"warn\": \"#B8541A\", \"danger\": \"#9A2A2A\", \"info\": \"#3A5280\" }\n  },\n  \"space\":  [0, 4, 8, 12, 16, 24, 32, 48, 64, 96],\n  \"radius\": { \"xs\": 2, \"sm\": 6, \"md\": 10, \"lg\": 16, \"full\": 9999 },\n  \"font\":   { \"sans\": \"DM Sans\", \"mono\": \"DM Mono\" }\n}<\u002Fpre>\n    <\u002Fdiv>\n    <div class=\"handoff__col\">\n      <h4>Component mapping<\u002Fh4>\n      <table class=\"handoff__table\">\n        <thead><tr><th>Old<\u002Fth><th>New<\u002Fth><th>Status<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>PurpleHero<\u002Ftd><td>MetricBoard<\u002Ftd><td><span class=\"badge badge--danger\"><i><\u002Fi>Remove<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>KpiCard (iconified)<\u002Ftd><td>Metric<\u002Ftd><td><span class=\"badge badge--warn\"><i><\u002Fi>Rewrite<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Sidebar<\u002Ftd><td>NavRail<\u002Ftd><td><span class=\"badge badge--warn\"><i><\u002Fi>Rewrite<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Table v1<\u002Ftd><td>Table<\u002Ftd><td><span class=\"badge badge--info\"><i><\u002Fi>Refactor<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Modal<\u002Ftd><td>Dialog<\u002Ftd><td><span class=\"badge badge--success\"><i><\u002Fi>Keep<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Button (7 variants)<\u002Ftd><td>Button (4 variants)<\u002Ftd><td><span class=\"badge badge--warn\"><i><\u002Fi>Rewrite<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>TagPill<\u002Ftd><td>Badge<\u002Ftd><td><span class=\"badge badge--info\"><i><\u002Fi>Refactor<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Leaderboard<\u002Ftd><td>RankedList<\u002Ftd><td><span class=\"badge badge--info\"><i><\u002Fi>Refactor<\u002Fspan><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <div class=\"handoff__col handoff__col--wide\">\n      <h4>Rollout plan<\u002Fh4>\n      <ol class=\"rollout\">\n        <li>\n          <div class=\"rollout__phase\">Phase 1 · Week 1–2<\u002Fdiv>\n          <div class=\"rollout__title\">Tokens &amp; primitives<\u002Fdiv>\n          <div class=\"rollout__detail\">Ship <code>tokens.json<\u002Fcode>, DM Sans/Mono via <code>@font-face<\u002Fcode>, reset button/input/badge/avatar. No visual change to users yet — all legacy components still render. Behind <code>?ds=v2<\u002Fcode> flag.<\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div class=\"rollout__phase\">Phase 2 · Week 3–4<\u002Fdiv>\n          <div class=\"rollout__title\">Navigation + dashboard<\u002Fdiv>\n          <div class=\"rollout__detail\">Replace sidebar and top dashboard. Highest visual impact, lowest risk — no destructive actions on these screens. Gather feedback from 10 SDRs in a design-partner cohort.<\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div class=\"rollout__phase\">Phase 3 · Week 5–7<\u002Fdiv>\n          <div class=\"rollout__title\">Lists, detail, call console<\u002Fdiv>\n          <div class=\"rollout__detail\">The daily driver for SDRs. Ship with a \"restore old UI\" escape hatch for two weeks. Track time-to-complete for core tasks before/after.<\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div class=\"rollout__phase\">Phase 4 · Week 8<\u002Fdiv>\n          <div class=\"rollout__title\">Settings, auth, onboarding, dialogs<\u002Fdiv>\n          <div class=\"rollout__detail\">Lower-traffic surfaces. Remove <code>?ds=v2<\u002Fcode> flag. Retire old component files. Publish v2 docs site.<\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div class=\"rollout__phase\">Phase 5 · Week 9–10<\u002Fdiv>\n          <div class=\"rollout__title\">Dark mode + mobile polish<\u002Fdiv>\n          <div class=\"rollout__detail\">Command Deck (direction C) ships as optional dark theme. Mobile call console refined with thumb-zone buttons and larger hit targets.<\u002Fdiv>\n        <\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div class=\"handoff__col\">\n      <h4>Migration rules for engineers<\u002Fh4>\n      <ul class=\"migrules\">\n        <li>Never hard-code hex. Use <code>var(--color-*)<\u002Fcode>.<\u002Fli>\n        <li>Never hard-code px spacing outside the 10-step scale. Use <code>var(--space-*)<\u002Fcode> or Tailwind <code>px-{step}<\u002Fcode>.<\u002Fli>\n        <li>Buttons: exactly one <code>--primary<\u002Fcode> per view. ESLint rule to flag violations.<\u002Fli>\n        <li>Icon size: 14 inside buttons, 16 in nav, 20 in empty states. No other sizes.<\u002Fli>\n        <li>Every interactive element must render a <code>:focus-visible<\u002Fcode> state using <code>--focus-ring<\u002Fcode>.<\u002Fli>\n        <li>No new component without a doc entry and a dark-mode variant.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"handoff__col\">\n      <h4>Success metrics<\u002Fh4>\n      <ul class=\"metrics-list\">\n        <li><strong>Time-to-first-call<\u002Fstrong> for a new SDR on day 1: target − 40%.<\u002Fli>\n        <li><strong>Dashboard scan time<\u002Fstrong> (eye-tracking): target − 25%.<\u002Fli>\n        <li><strong>Accessibility audit<\u002Fstrong>: 100% WCAG AA on all shipped surfaces.<\u002Fli>\n        <li><strong>Support tickets<\u002Fstrong> mentioning \"can't find\" / \"hard to read\": target − 50% in 90 days.<\u002Fli>\n        <li><strong>Component sprawl<\u002Fstrong>: 63 legacy components → 24 system components.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"signoff\">\n    <div class=\"signoff__line\"><\u002Fdiv>\n    <div class=\"signoff__text\">\n      <div class=\"signoff__eyebrow\">End of spec<\u002Fdiv>\n      <div class=\"signoff__note\">A system is only as good as its enforcement. Ship the tokens, the lint rules, and the doc site in the same week — otherwise v2 becomes v1.5 plus opinions.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script type=\"text/babel-disabled\">\n  // placeholder\n<\u002Fscript>\n<script>\n/* =========================================================\n   Applied Screens — CaptainProspect v2\n   Rendered directly into #screens-mount\n   ========================================================= */\n(function(){\n  const mount = document.getElementById('screens-mount');\n  if(!mount) return;\n\n  const icon = {\n    overview: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"1.5\" y=\"1.5\" width=\"5\" height=\"5\" rx=\"1\" stroke=\"currentColor\" stroke-width=\"1.3\"/><rect x=\"7.5\" y=\"1.5\" width=\"5\" height=\"5\" rx=\"1\" stroke=\"currentColor\" stroke-width=\"1.3\"/><rect x=\"1.5\" y=\"7.5\" width=\"5\" height=\"5\" rx=\"1\" stroke=\"currentColor\" stroke-width=\"1.3\"/><rect x=\"7.5\" y=\"7.5\" width=\"5\" height=\"5\" rx=\"1\" stroke=\"currentColor\" stroke-width=\"1.3\"/><\u002Fsvg>',\n    missions: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 3h10M2 7h10M2 11h6\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    lists: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"1.5\" y=\"1.5\" width=\"11\" height=\"11\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.3\"/><path d=\"M1.5 5h11M5 5v7.5\" stroke=\"currentColor\" stroke-width=\"1.3\"/><\u002Fsvg>',\n    calls: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 2h2l1 3-1.5 1a7 7 0 003.5 3.5l1-1.5 3 1v2a1 1 0 01-1 1A10 10 0 012 3a1 1 0 011-1z\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    clients: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"5\" r=\"2.2\" stroke=\"currentColor\" stroke-width=\"1.3\"/><path d=\"M2.5 12c.5-2.3 2.3-3.5 4.5-3.5s4 1.2 4.5 3.5\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    meet: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"1.5\" y=\"2.5\" width=\"11\" height=\"10\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.3\"/><path d=\"M1.5 5.5h11M4 1v3M10 1v3\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    stats: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 12V8M6 12V4M10 12V7\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    email: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"1.5\" y=\"3\" width=\"11\" height=\"8\" rx=\"1.3\" stroke=\"currentColor\" stroke-width=\"1.3\"/><path d=\"M2 4l5 3.5L12 4\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    search: '<svg width=\"13\" height=\"13\" viewBox=\"0 0 13 13\" fill=\"none\"><circle cx=\"5.5\" cy=\"5.5\" r=\"3.8\" stroke=\"currentColor\" stroke-width=\"1.3\"/><path d=\"M8.5 8.5l3 3\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    more: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"3\" cy=\"7\" r=\"1\" fill=\"currentColor\"/><circle cx=\"7\" cy=\"7\" r=\"1\" fill=\"currentColor\"/><circle cx=\"11\" cy=\"7\" r=\"1\" fill=\"currentColor\"/><\u002Fsvg>',\n    bell: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 10V6.5a4 4 0 018 0V10M2 10h10M6 12a1 1 0 002 0\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    filter:'<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 3h10l-4 5v4l-2-1V8L2 3z\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    plus: '<svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M6 2v8M2 6h8\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    arrow:'<svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 6h8M7 3l3 3-3 3\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    phone:'<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 2h2l1 3-1.5 1a7 7 0 003.5 3.5l1-1.5 3 1v2a1 1 0 01-1 1A10 10 0 012 3a1 1 0 011-1z\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    chat: '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M2 3.5h10v6H6l-3 2.5V9.5H2v-6z\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n  };\n\n  // Reusable sidebar\n  function sidebar(active){\n    const items = [\n      ['overview','Overview','1',null,'Overview'],\n      ['missions','Missions','2','12','Missions'],\n      ['lists','Lists & Prospection','3','34','Lists'],\n      ['calls','Calls','4',null,'Calls'],\n    ];\n    const items2 = [\n      ['clients','Clients',null,null,'Clients'],\n      ['meet','Meetings',null,'3w','Meetings'],\n      ['stats','Statistics',null,null,'Statistics'],\n      ['email','Email Hub',null,null,'Email'],\n    ];\n    const row = ([ic,label,kbd,count,key])=>{\n      const on = key===active?' navdemo__item--on':'';\n      const badge = count\n        ? (count.endsWith('w')\n          ? `<span class=\"navdemo__count navdemo__count--warn\">${count.replace('w','')}<\u002Fspan>`\n          : `<span class=\"navdemo__count\">${count}<\u002Fspan>`)\n        : (kbd?`<kbd class=\"kbd kbd--ghost\">${kbd}<\u002Fkbd>`:'');\n      return `<div class=\"navdemo__item${on}\"><span class=\"nav-ic\">${icon[ic]}<\u002Fspan>${label}${badge}<\u002Fdiv>`;\n    };\n    return `\n      <aside class=\"scr-nav\">\n        <div class=\"navdemo__brand\"><div class=\"navdemo__mark\"><\u002Fdiv><div><div class=\"navdemo__name\">CaptainProspect<\u002Fdiv><div class=\"navdemo__org\">Acme Prospection<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"navdemo__search\">${icon.search}<span>Search missions, contacts…<\u002Fspan><kbd class=\"kbd\">⌘K<\u002Fkbd><\u002Fdiv>\n        <div class=\"navdemo__group\">${items.map(row).join('')}<\u002Fdiv>\n        <div class=\"navdemo__group\">\n          <div class=\"navdemo__section\">Follow-up<\u002Fdiv>\n          ${items2.map(row).join('')}\n        <\u002Fdiv>\n        <div class=\"navdemo__foot\">\n          <div class=\"navdemo__profile\"><span class=\"avatar avatar--sm\" data-init=\"JF\">JF<\u002Fspan><div><div class=\"navdemo__who\">Jean-François<\u002Fdiv><div class=\"navdemo__role\">Manager · Acme<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Faside>`;\n  }\n\n  // Reusable topbar\n  function topbar(title, breadcrumb, actions){\n    return `\n      <header class=\"scr-top\">\n        <div class=\"scr-top__crumbs\">${breadcrumb}<\u002Fdiv>\n        <div class=\"scr-top__tools\">\n          <button class=\"btn btn--ghost btn--sm\">${icon.chat}<\u002Fbutton>\n          <button class=\"btn btn--ghost btn--sm\">${icon.bell}<span class=\"scr-top__dot\"><\u002Fspan><\u002Fbutton>\n          <div class=\"scr-top__sep\"><\u002Fdiv>\n          ${actions||''}\n        <\u002Fdiv>\n      <\u002Fheader>`;\n  }\n\n  function screenCard(label, title, note, body){\n    return `\n      <div class=\"scr\">\n        <div class=\"scr__head\">\n          <div class=\"scr__kicker\">${label}<\u002Fdiv>\n          <h3 class=\"scr__title\">${title}<\u002Fh3>\n          <p class=\"scr__note\">${note}<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"scr__frame\">${body}<\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n\n  // ---------------- Screen 1: Dashboard ----------------\n  const leader = [\n    [1,'Hichem','H',25,100,true],\n    [2,'Sophie','S',20,80,false],\n    [3,'Jean-François','JF',17,68,false],\n    [4,'Maxime','M',6,24,false],\n    [5,'Léa-Maria','LM',4,16,false],\n  ].map(([r,n,i,v,w])=>`\n    <div class=\"rank\">\n      <span class=\"rank__n mono\">${String(r).padStart(2,'0')}<\u002Fspan>\n      <span class=\"avatar avatar--sm\" data-init=\"${i}\">${i}<\u002Fspan>\n      <div class=\"rank__name\">${n}<\u002Fdiv>\n      <div class=\"rank__bar\"><i style=\"width:${w}%\"><\u002Fi><\u002Fdiv>\n      <div class=\"rank__v mono\">${v}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n\n  const callBreakdown = [\n    ['No answer','no-answer',7122,72],\n    ['Interested','ok',1,0.01],\n    ['Call back','back',28,0.3],\n    ['Out of target','ot',63,0.6],\n    ['Refused','ref',885,9],\n    ['Forwarded','fwd',377,3.8],\n    ['Email only','email',159,1.6],\n    ['Recall','rec',5,0.05] on class=\"btn btn--primary\">Continue ${icon.arrow}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>`;\n\n  // ---------------- Screen 5: Auth / Login ----------------\n  const auth = `\n    <div class=\"auth\">\n      <aside class=\"auth__left\">\n        <div class=\"auth__brand\">\n          <div class=\"navdemo__mark\"><\u002Fdiv>\n          <div class=\"navdemo__name\">CaptainProspect<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"auth__pitch\">\n          <div class=\"auth__eyebrow\">CRM for prospecting teams<\u002Fdiv>\n          <h1>Close more meetings,<br/>with less noise.<\u002Fh1>\n          <p>Every call, every follow-up, every lead — in one quiet workspace your SDRs actually enjoy living in.<\u002Fp>\n          <div class=\"auth__stats\">\n            <div><div class=\"auth__stat-v mono\">12k+<\u002Fdiv><div class=\"auth__stat-l\">SDRs on board<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"auth__stat-v mono\">2.4M<\u002Fdiv><div class=\"auth__stat-l\">Calls last month<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"auth__stat-v mono\">38%<\u002Fdiv><div class=\"auth__stat-l\">Avg. lift in RDV<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"auth__foot mono\">© 2026 CaptainProspect · Paris<\u002Fdiv>\n      <\u002Faside>\n      <section class=\"auth__right\">\n        <div class=\"auth__card\">\n          <div class=\"auth__kicker mono\">SIGN IN<\u002Fdiv>\n          <h2>Welcome back.<\u002Fh2>\n          <p class=\"auth__sub\">Use your work email to continue.<\u002Fp>\n          <div class=\"field\"><label class=\"field__label\">Email<\u002Flabel><div class=\"input\"><input value=\"jean-francois@acme.fr\"/><\u002Fdiv><\u002Fdiv>\n          <div class=\"field\">\n            <div class=\"auth__field-top\"><label class=\"field__label\">Password<\u002Flabel><a class=\"auth__link\" href=\"#\">Forgot?<\u002Fa><\u002Fdiv>\n            <div class=\"input\"><input type=\"password\" value=\"••••••••••••\"/><\u002Fdiv>\n          <\u002Fdiv>\n          <label class=\"check auth__remember\"><input type=\"checkbox\" checked/><span><\u002Fspan>Keep me signed in on this device<\u002Flabel>\n          <button class=\"btn btn--primary btn--lg auth__cta\">Continue ${icon.arrow}<\u002Fbutton>\n          <div class=\"auth__or\"><span><\u002Fspan>or<span><\u002Fspan><\u002Fdiv>\n          <button class=\"btn btn--secondary btn--lg auth__sso\">Continue with SSO<\u002Fbutton>\n          <div class=\"auth__switch\">New to CaptainProspect? <a href=\"#\">Request access<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>`;\n\n  // ---------------- Screen 6: Navigation system ----------------\n  const navSystem = `\n    <div class=\"nav-system\">\n      <div class=\"nav-system__item\">\n        <div class=\"nav-system__label\">Full drawer · 260px<\u002Fdiv>\n        ${sidebar('Overview')}\n      <\u002Fdiv>\n      <div class=\"nav-system__item\">\n        <div class=\"nav-system__label\">Rail collapsed · 72px<\u002Fdiv>\n        <aside class=\"scr-nav scr-nav--rail\">\n          <div class=\"navdemo__mark\"><\u002Fdiv>\n          <div class=\"rail-item rail-item--on\" title=\"Overview\">${icon.overview}<\u002Fdiv>\n          <div class=\"rail-item rail-item--badged\" title=\"Missions\">${icon.missions}<em>12<\u002Fem><\u002Fdiv>\n          <div class=\"rail-item\" title=\"Lists\">${icon.lists}<\u002Fdiv>\n          <div class=\"rail-item\" title=\"Calls\">${icon.calls}<\u002Fdiv>\n          <div class=\"rail-sep\"><\u002Fdiv>\n          <div class=\"rail-item\" title=\"Clients\">${icon.clients}<\u002Fdiv>\n          <div class=\"rail-item rail-item--warn\" title=\"Meetings\">${icon.meet}<em>3<\u002Fem><\u002Fdiv>\n          <div class=\"rail-item\" title=\"Stats\">${icon.stats}<\u002Fdiv>\n          <div class=\"rail-item\" title=\"Email Hub\">${icon.email}<\u002Fdiv>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <span class=\"avatar avatar--sm\" data-init=\"JF\">JF<\u002Fspan>\n        <\u002Faside>\n      <\u002Fdiv>\n      <div class=\"nav-system__item nav-system__item--wide\">\n        <div class=\"nav-system__label\">Topbar anatomy<\u002Fdiv>\n        <div class=\"scr-top scr-top--solo\">\n          <div class=\"scr-top__crumbs\"><span>Lists<\u002Fspan> <i>/<\u002Fi> <span>Q2 · SaaS mid-market<\u002Fspan> <i>/<\u002Fi> <strong>Marie Dubois<\u002Fstrong><\u002Fdiv>\n          <div class=\"scr-top__tools\">\n            <div class=\"input input--search input--topbar\"><span>${icon.search}<\u002Fspan><input placeholder=\"Jump to…\"/><kbd class=\"kbd\">⌘K<\u002Fkbd><\u002Fdiv>\n            <button class=\"btn btn--ghost btn--sm\">${icon.chat}<\u002Fbutton>\n            <button class=\"btn btn--ghost btn--sm\">${icon.bell}<span class=\"scr-top__dot\"><\u002Fspan><\u002Fbutton>\n            <div class=\"scr-top__sep\"><\u002Fdiv>\n            <button class=\"btn btn--primary btn--sm\">${icon.phone}Call now<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n\n  // ---------------- Assemble ----------------\n  mount.innerHTML = [\n    screenCard('5.1 Dashboard', 'Manager overview',\n      'One lead question — \"where does the team stand?\" — answered in the first 300px. Dark purple hero gone; the single-view hierarchy is now: greeting → target → four metrics → three supporting panels.',\n      `<div class=\"scr__scale\"><div class=\"scr__zoom\">${dashboard}<\u002Fdiv><\u002Fdiv>`),\n    screenCard('5.2 List view', 'Prospecting list',\n      'Same data density as before, but rows breathe (56px), mono numerals align, chips replace dropdowns for filters, and hot leads use a solid badge so they\\'re unmistakable at a glance.',\n      `<div class=\"scr__scale\"><div class=\"scr__zoom\">${listView}<\u002Fdiv><\u002Fdiv>`),\n    screenCard('5.3 Detail view', 'Contact profile',\n      'Two-pane layout D80', soft:'#E3E8F4' },\n    terracotta:{ primary:'#A24B2C', hover:'#833A21', soft:'#F3DFD5' },\n  };\n  const RADII = {\n    sharp:  { xs:'0px',  sm:'3px', md:'5px',  lg:'8px'  },\n    soft:   { xs:'2px',  sm:'6px', md:'10px', lg:'16px' },\n    round:  { xs:'6px',  sm:'10px',md:'16px', lg:'24px' },\n  };\n  const DENSITY = {\n    compact:  { btn:'30px', pad:'24px' },\n    balanced: { btn:'36px', pad:'32px' },\n    spacious: { btn:'42px', pad:'40px' },\n  };\n\n  const state = Object.assign({}, TWEAK_DEFAULS);\n\n  function apply(){\n    const a = ACCENTS[state.accent] || ACCENTS.forest;\n    root.style.setProperty('--accent-primary', a.primary);\n    root.style.setProperty('--accent-primary-hover', a.hover);\n    root.style.setProperty('--accent-primary-soft', a.soft);\n    root.style.setProperty('--signal-success', a.primary);\n    root.style.setProperty('--signal-success-soft', a.soft);\n\n    const r = RADII[state.radius] || RADII.soft;\n    root.style.setProperty('--r-xs', r.xs);\n    root.style.setProperty('--r-sm', r.sm);\n    root.style.setProperty('--r-md', r.md);\n    root.style.setProperty('--r-lg', r.lg);\n  }\n\n  // Build panel\n  const panel = document.createElement('div');\n  panel.className = 'tweaks';\n  panel.innerHTML = `\n    <div class=\"tweaks__title\">Tweaks<\u002Fdiv>\n    <div class=\"tweaks__row\">\n      <div class=\"tweaks__label\">Accent<\u002Fdiv>\n      <div class=\"tweaks__swatches\" data-group=\"accent\">\n        ${Object.entries(ACCENTS).map(([k,v])=>`<button data-v=\"${k}\" style=\"background:${v.primary}\" title=\"${k}\"><\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tweaks__row\">\n      <div class=\"tweaks__label\">Radius<\u002Fdiv>\n      <div class=\"c-row\" data-group=\"radius\">\n        ${Object.keys(RADII).map(k=>`<button class=\"btn btn--ghost btn--sm\" data-v=\"${k}\">${k}<\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  document.body.appendChild(panel);\n\n  function refresh(){\n    panel.querySelectorAll('[data-group=\"accent\"] button').forEach(b=>{\n      b.setAttribute('aria-pressed', b.dataset.v===state.accent ? 'true':'false');\n    });\n    panel.querySelectorAll('[data-group=\"radius\"] button').forEach(b=>{\n      b.classList.toggle('btn--secondary', b.dataset.v===state.radius);\n      b.classList.toggle('btn--ghost', b.dataset.v!==state.radius);\n    });\n  }\n\n  panel.addEventListener('click', (e)=>{\n    const btn = e.target.closest('button[data-v]');\n    if(!btn) return;\n    const group = btn.closest('[data-group]').dataset.group;\n    state[group] = btn.dataset.v;\n    apply(); refresh();\n    try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[group]:btn.dataset.v}},'*'); }catch(_){}\n  });\n\n  window.addEventListener('message', (e)=>{\n    if(!e.data) return;\n    if(e.data.type==='__activate_edit_mode') panel.classList.add('is-on');\n    if(e.data.type==='__deactivate_edit_mode') panel.classList.remove('is-on');\n  });\n\n  apply(); refresh();\n  try{ window.parent.postMessage({type:'__edit_mode_available'},'*'); }catch(_){}\n})();\n\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
